<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#00ffd0"/>
      <stop offset="100%" stop-color="#4dabff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="#05070a"/>
  <g fill="url(#wave)" filter="url(#glow)">
    <rect x="18" y="44" width="8" height="12" rx="4"/>
    <rect x="32" y="34" width="8" height="32" rx="4"/>
    <rect x="46" y="22" width="8" height="56" rx="4"/>
    <rect x="60" y="34" width="8" height="32" rx="4"/>
    <rect x="74" y="44" width="8" height="12" rx="4"/>
  </g>
</svg>
